# Jekyll + Minimal Mistakes (blog)
# https://mmistakes.github.io/minimal-mistakes/

remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "mint" # green tint for energy/solar

# Site
locale: "en-US"
title: "Greenrise Energy Solutions"
title_separator: "|"
description: "Solar EPC solutions for homes, businesses & industries. Clean, reliable solar energy across India."
url: "https://greenriseenergy.com"
baseurl: ""
repository: "YOUR_GITHUB_USERNAME/greenriseenergy"  # set to your GitHub user/repo

# Plugins (jekyll-paginate-v2 requires GitHub Actions build for GitHub Pages)
plugins:
  - jekyll-paginate-v2
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Pagination (15 per page for blog)
pagination:
  enabled: true
  per_page: 15
  permalink: '/blog/page:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true

# Defaults for posts (Minimal Mistakes)
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      share: true
      related: true
      comments: false

# Permalink for posts
permalink: /blog/:year/:month/:day/:title/

# Build
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"
